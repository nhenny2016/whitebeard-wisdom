<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none" role="img" aria-label="James Whitfield, Executive Life Coach">
  <rect width="400" height="500" fill="#f8f9fb"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2b48"/>
      <stop offset="100%" stop-color="#2a3f66"/>
    </linearGradient>
  </defs>
  <!-- Hex frame background -->
  <path d="M200 20 L360 110 L360 310 L200 400 L40 310 L40 110 Z" fill="url(#bg)" opacity="0.15"/>
  <!-- Shoulders / blazer -->
  <path d="M80 420 Q200 380 320 420 L320 500 L80 500 Z" fill="#1b2b48"/>
  <path d="M120 400 Q200 370 280 400 L280 420 Q200 390 120 420 Z" fill="#2a3f66"/>
  <!-- Neck -->
  <rect x="175" y="320" width="50" height="60" fill="#d4a574"/>
  <!-- Head -->
  <ellipse cx="200" cy="260" rx="75" ry="85" fill="#d4a574"/>
  <!-- White beard -->
  <path d="M125 290 Q200 420 275 290 Q260 360 200 380 Q140 360 125 290" fill="#f8f8f8"/>
  <path d="M140 300 Q200 370 260 300 Q250 340 200 355 Q150 340 140 300" fill="#eeeeee"/>
  <!-- Mustache -->
  <path d="M165 295 Q200 310 235 295" fill="#f0f0f0"/>
  <!-- Glasses -->
  <rect x="145" y="235" width="45" height="32" rx="6" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="210" y="235" width="45" height="32" rx="6" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="190" y1="251" x2="210" y2="251" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Eyes behind glasses -->
  <circle cx="167" cy="251" r="4" fill="#2a2a2a"/>
  <circle cx="233" cy="251" r="4" fill="#2a2a2a"/>
  <!-- Warm smile -->
  <path d="M170 290 Q200 305 230 290" fill="none" stroke="#8b6914" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bald head highlight -->
  <ellipse cx="200" cy="210" rx="55" ry="30" fill="#e0b888" opacity="0.3"/>
</svg>
